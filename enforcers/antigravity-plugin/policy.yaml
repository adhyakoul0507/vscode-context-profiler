filesystem:
  read:
    - /project/**
  write:
    - /project/src/**
  deny:
    - ~/.aws/**

terminal:
  allow:
    - ls
    - pwd
    - cat
    - grep
    - tar
    - mkdir
    - code
    - open
    - curl
  ask:
    - pip
    - git commit
  deny:
    - rm
    - sudo

network:
  allow:
    - github.com
    - pypi.org
    - google.com
  deny:
    - "*"
