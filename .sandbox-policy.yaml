terminal:
  allow:
    - npm
    - npx
    - git
  deny:
    - rm -rf
    - sudo
    - chmod 777
    - curl | sh
    - wget | sh

network:
  allowed_domains:
    - registry.npmjs.org
    - github.com
  deny:
    - "*"

fs:
  allowed_paths:
    - /home/user/project/./
    - /home/user/project/src/
    - /home/user/project/public/
  denied_paths:
    - /home/user/.ssh
    - /home/user/.aws
    - /home/user/.gnupg
    - /etc
    - ~/.ssh
    - ~/.aws
    - ~/.gnupg

